name: Build & Release NutriCook

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v0.2.3)'
        required: true
        default: 'v0.2.3'

jobs:
  # ─── Android APK ───────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android-twa/local.properties

      - name: Create keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android-twa/nutricook.keystore
            echo "Keystore ready ($(wc -c < android-twa/nutricook.keystore) bytes)"
          else
            echo "No keystore, will use debug signing"
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android-twa
        run: |
          gradle assembleRelease --no-daemon 2>&1 || {
            echo "Release build failed, trying debug..."
            gradle assembleDebug --no-daemon
          }

      - name: Find and copy APK
        id: apk
        working-directory: android-twa
        run: |
          APK=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          echo "Found: $APK"
          ls -la "$APK"
          cp "$APK" "../NutriCook-0.2.3-android.apk"
          echo "apk_name=NutriCook-0.2.3-android.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutricook-android-apk
          path: NutriCook-0.2.3-android.apk
          retention-days: 30

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}-android
          name: "NutriCook v0.2.3 - Android"
          body: "APK compilado automáticamente con GitHub Actions."
          files: NutriCook-0.2.3-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS DMG ─────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Pillow for icon creation
        run: pip3 install Pillow --break-system-packages 2>/dev/null || pip3 install Pillow

      - name: Create macOS icons
        run: |
          mkdir -p build
          python3 create-icons.py
          ls -la build/

      - name: Install dmg-license (macOS only dependency)
        run: npm install dmg-license 2>&1 || echo "dmg-license install failed, will try zip target"

      - name: Build macOS App
        env:
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          npx electron-builder --mac --publish=never 2>&1 || \
          npx electron-builder --mac --publish=never --config.mac.target=zip --config.directories.output=dist-mac 2>&1

      - name: Ad-hoc sign app (removes 'damaged' warning on macOS)
        run: |
          APP=$(find . -name "*.app" -not -path "*/node_modules/*" | head -1)
          if [ -n "$APP" ]; then
            echo "Signing: $APP"
            codesign --sign - --force --deep "$APP" 2>&1 || echo "codesign skipped"
          fi
          # Also re-sign the DMG if exists
          DMG=$(find . -name "*.dmg" -not -path "*/node_modules/*" | head -1)
          if [ -n "$DMG" ]; then
            echo "Re-signing DMG: $DMG"
            # Extract, sign, repackage
            hdiutil attach "$DMG" -mountpoint /tmp/dmg_mount -nobrowse -quiet 2>&1 || true
            APP_IN_DMG=$(find /tmp/dmg_mount -name "*.app" 2>/dev/null | head -1)
            if [ -n "$APP_IN_DMG" ]; then
              codesign --sign - --force --deep "$APP_IN_DMG" 2>&1 || echo "DMG app sign skipped"
            fi
            hdiutil detach /tmp/dmg_mount -quiet 2>&1 || true
          fi

      - name: Remove quarantine attributes from built files
        run: |
          find dist-electron -name "*.app" -exec xattr -cr {} \; 2>/dev/null || true
          find dist-electron -name "*.dmg" -exec xattr -cr {} \; 2>/dev/null || true

      - name: Find built files
        run: |
          find . -name "*.dmg" -o -name "*.zip" | grep -v node_modules | grep -v ".git"

      - name: Copy artifacts
        run: |
          DMG=$(find . \( -name "*.dmg" \) | grep -v node_modules | head -1)
          ZIP=$(find . \( -name "*mac*.zip" \) | grep -v node_modules | head -1)
          [ -n "$DMG" ] && cp "$DMG" "NutriCook-0.2.3-mac.dmg" || echo "No DMG found"
          [ -n "$ZIP" ] && cp "$ZIP" "NutriCook-0.2.3-mac.zip" || echo "No ZIP found"
          ls -la NutriCook-*.* 2>/dev/null || echo "No artifacts found"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nutricook-macos
          path: |
            NutriCook-0.2.3-mac.dmg
            NutriCook-0.2.3-mac.zip
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}-macos
          name: "NutriCook v0.2.3 - macOS"
          body: "DMG compilado automáticamente con GitHub Actions en macos-latest."
          files: |
            NutriCook-0.2.3-mac.dmg
            NutriCook-0.2.3-mac.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

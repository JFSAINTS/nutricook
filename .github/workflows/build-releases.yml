name: Build & Release NutriCook

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'

jobs:
  # ─── Android APK ───────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android-twa/local.properties

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android-twa/nutricook.keystore
            echo "Using signed keystore"
          else
            echo "No keystore secret found, building unsigned debug APK"
          fi

      - name: Build APK (Release)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'nutricook123' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'nutricook' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'nutricook123' }}
        working-directory: android-twa
        run: |
          gradle assembleRelease --no-daemon 2>&1 || gradle assembleDebug --no-daemon
          find . -name "*.apk" -type f

      - name: Find APK
        id: find_apk
        working-directory: android-twa
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls -la $APK

      - name: Rename APK
        run: |
          cp "android-twa/${{ steps.find_apk.outputs.apk_path }}" "NutriCook-0.2.0-android.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}-android
          name: "NutriCook v0.2.0 - Android"
          files: NutriCook-0.2.0-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutricook-android-apk
          path: NutriCook-0.2.0-android.apk

  # ─── macOS DMG ─────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create macOS icon
        run: |
          mkdir -p build
          python3 - <<'EOF'
          from PIL import Image, ImageDraw
          import os

          def create_icon(size):
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              margin = max(2, int(size * 0.05))
              draw.ellipse([margin, margin, size-margin, size-margin], fill=(16, 185, 129, 255))
              cx, cy = size // 2, size // 2
              pr = int(size * 0.28)
              draw.ellipse([cx-pr, cy-pr//2, cx+pr, cy+pr//2+int(size*0.05)], fill=(255,255,255,220))
              return img

          sizes = [16, 32, 48, 128, 192, 256, 512, 1024]
          for s in sizes:
              create_icon(s).save(f'build/icon_{s}.png')
          print('Icons created')
          EOF

          # Create ICNS for macOS
          mkdir -p build/icon.iconset
          for s in 16 32 128 256 512; do
            cp build/icon_${s}.png build/icon.iconset/icon_${s}x${s}.png
            cp build/icon_${s}.png build/icon.iconset/icon_${s}x${s}@2x.png 2>/dev/null || true
          done
          iconutil -c icns build/icon.iconset -o build/icon.icns 2>/dev/null || \
            cp build/icon_512.png build/icon.icns
          ls -la build/

      - name: Build macOS App
        env:
          ELECTRON_BUILDER_CACHE: /tmp/electron-builder-cache
        run: |
          npm run build:mac 2>&1 || npx electron-builder --mac --config.directories.output=dist-mac 2>&1

      - name: Find DMG/ZIP
        run: |
          find . -name "*.dmg" -o -name "*.zip" | grep -v node_modules | head -20

      - name: Rename artifacts
        run: |
          DMG=$(find . -name "*.dmg" | grep -v node_modules | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "NutriCook-0.2.0-mac.dmg"
            echo "DMG: $DMG"
          fi
          ZIP=$(find . -name "*mac*.zip" | grep -v node_modules | head -1)
          if [ -n "$ZIP" ]; then
            cp "$ZIP" "NutriCook-0.2.0-mac.zip"
            echo "ZIP: $ZIP"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}-macos
          name: "NutriCook v0.2.0 - macOS"
          files: |
            NutriCook-0.2.0-mac.dmg
            NutriCook-0.2.0-mac.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nutricook-macos
          path: |
            NutriCook-0.2.0-mac.dmg
            NutriCook-0.2.0-mac.zip
